<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel" id="carousel">

        <div class="slides">
            <img src="https://picsum.photos/id/1015/800/400" class="slide active">
            <img src="https://picsum.photos/id/1016/800/400" class="slide">
            <img src="https://picsum.photos/id/1018/800/400" class="slide">
            <img src="https://picsum.photos/id/1020/800/400" class="slide">
        </div>

        <button class="btn prev" id="prevBtn">
            ❮
        </button>

        <button class="btn next" id="nextBtn">
            ❯
        </button>

    </div>

    <script src="script.js"></script>
</body>
</html>
